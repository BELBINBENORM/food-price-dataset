name: Update Food Price Dataset

on:
  schedule:
    # Runs every Monday at 7:00 AM UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Lets you trigger it manually from GitHub UI anytime

jobs:
  update:
    runs-on: ubuntu-latest        # Azure IP — FAO/WB not blocked here

    steps:
      # 1. Check out your repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the notebook — outputs CSVs into the outputs/ folder
      - name: Execute notebook
        run: |
          mkdir -p outputs
          jupyter nbconvert \
            --to notebook \
            --execute notebook.ipynb \
            --output executed.ipynb \
            --ExecutePreprocessor.timeout=600
        env:
          OUTPUT_DIR: outputs

      # 5. Show what was produced
      - name: List outputs
        run: ls -lh outputs/

      # 6. Push new CSVs to Kaggle as a new dataset version
      - name: Upload to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          cd outputs
          cp ../dataset-metadata.json .
          kaggle datasets version \
            --path . \
            --message "Auto-update $(date +'%Y-%m-%d')" \
            --dir-mode zip
